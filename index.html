<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>V Radio Player</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&display=swap');
    
    /* === VARIÁVEIS DE TEMA (Controladas pelo JS) === */
    :root {
      --accent-color: #65d671;
      --accent-shadow: rgba(101, 214, 113, 0.5);
      --bg-image: url('https://img.goodfon.com/original/1920x1080/b/6f/gta-5-proshlo-desyat-let.jpg');
    }

    body {
      margin: 0;
      color: #eee;
      font-family: 'Roboto Condensed', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      
      /* Bloqueio de seleção e menus de contexto no mobile */
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      -webkit-touch-callout: none;
      
      overflow: hidden;
      overscroll-behavior: none;
      position: relative; 
    }

    body::before {
      content: "";
      position: absolute;
      top: -10%; left: -10%; 
      width: 120%; height: 120%; 
      background: var(--bg-image) center/cover;
      filter: blur(10px) brightness(0.75); 
      animation: cameraPan 40s linear infinite alternate;
      z-index: -1;
    }

    @keyframes cameraPan {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(-2%, -2%); }
    }
    
    /* === SISTEMA DE TELAS === */
    .view {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }
    .view.active { display: flex; }

    /* === MENU INICIAL === */
    #menuTitle {
      font-size: 2rem;
      color: var(--accent-color);
      margin-bottom: 40px;
      text-shadow: 0 0 10px var(--accent-shadow);
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      font-weight: 700;
      transition: all 0.3s ease;
    }
    .menu-row { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
    .btn-exp {
      background: #222; color: #fff; border: 2px solid #555;
      padding: 20px 40px; font-size: 1.2rem; font-family: inherit;
      cursor: pointer; border-radius: 8px; transition: all 0.2s;
      min-width: 250px; text-align: center; text-transform: uppercase;
      font-weight: 700;
    }
    .btn-exp:hover {
      background: var(--accent-color); color: #000; border-color: var(--accent-color);
      transform: scale(1.05); box-shadow: 0 0 15px var(--accent-shadow);
    }
    
    /* Botão Online específico */
    .btn-online:hover {
      background: #00a2ff; color: #000; border-color: #00a2ff;
      box-shadow: 0 0 15px rgba(0, 162, 255, 0.5);
    }

    /* === TELA DO PLAYER === */
    #viewPlayer {
      position: relative;
      touch-action: none; 
      cursor: crosshair;
    }

    #radioHeader {
      position: absolute;
      top: 40px;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      width: 90%;
      max-width: 1000px;
      z-index: 50;
      pointer-events: auto;
    }
    #btnBack {
      background: transparent; color: #aaa; border: 1px solid #aaa;
      padding: 8px 16px; font-family: inherit; cursor: pointer;
      border-radius: 4px; transition: 0.2s;
      z-index: 60;
    }
    #btnBack:hover { background: #333; color: #fff; border-color: #fff; }

    /* === RODA DE RÁDIOS === */
    #wheelContainer {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      display: none; 
      pointer-events: none;
      z-index: 10;
      
      transition: transform 0.25s ease-out;
      will-change: transform;
      transform-origin: 0px 0px; 
    }
    
    #wheelContainer.visible {
      display: block;
    }

    .wheel-item {
      position: absolute;
      width: 90px; 
      height: 90px;
      margin-top: -45px;
      margin-left: -45px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.25;
      pointer-events: none;
      border-radius: 50%;
      border: 3px solid transparent; 
      padding: 0; 
      box-sizing: border-box;
      background: transparent;
      z-index: 10;
      
      transition: transform 0.1s, box-shadow 0.1s;
    }
    
    .wheel-item.active {
      opacity: 1;
      z-index: 20; 
      border-color: var(--accent-color); 
      box-shadow: 0 0 10px var(--accent-shadow);
    }

    .wheel-item img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover; 
      -webkit-user-drag: none;
    }

    /* === FIX DAS RÁDIOS COM ZOOM === */
    .zoom-radio {
      transform: scale(1.087);
      clip-path: circle(46% at 50% 50%);
    }

    /* === DISPLAY CENTRAL === */
    #centerDisplay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 30; 
      width: 100%;
      max-width: 500px;
      pointer-events: none;
    }

    #centerLogoWrapper {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      margin-bottom: 20px;
      display: none;
      box-sizing: border-box;
      border: 3px solid var(--accent-color);
      box-shadow: 0 0 10px var(--accent-shadow);
      background: transparent;
    }

    #activeColorLogo {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block; 
    }
    
    #radioNameText {
      font-size: 1.3rem; 
      color: #ffffff;
      text-align: center;
      font-weight: 400;
      letter-spacing: 0.5px;
      
      text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
         
      display: block; 
    }

    #centerDisplay.wheel-open #centerLogoWrapper { display: none !important; }
    #centerDisplay.wheel-open #radioNameText { display: block !important; }

    #centerDisplay.flash-image:not(.wheel-open) #centerLogoWrapper { display: block; }
    #centerDisplay.flash-image:not(.wheel-open) #radioNameText { display: none; }

    /* Ajustes específicos de celular para a roda */
    @media (max-width: 768px) {
      .wheel-item { width: 50px; height: 50px; margin-top: -25px; margin-left: -25px; border-width: 2px; }
      #radioNameText { font-size: 1.35rem; }
      
      /* OCULTA o texto no celular enquanto a roda está aberta */
      #centerDisplay.wheel-open #radioNameText { display: none !important; }
      
      .menu-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div id="viewMenu" class="view active">
    <div id="menuTitle">Selecione a Plataforma</div>
    <div class="menu-row">
      <button class="btn-exp" data-exp="v">Grand Theft Auto V</button>
      <button class="btn-exp btn-online" data-exp="online">GTA Online</button>
    </div>
  </div>

  <div id="viewPlayer" class="view">
    <div id="radioHeader">
      <button id="btnBack">⬅ Voltar</button>
    </div>

    <div id="centerDisplay">
      <div id="centerLogoWrapper">
        <img id="activeColorLogo" src="capas/default.png" draggable="false" />
      </div>
      <div id="radioNameText"></div>
    </div>
    
    <div id="wheelContainer"></div>
  </div>

  <script src="geral.js"></script>
  <script src="station.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script src="renderer.js"></script>
  
  <script>

    // ----------------- SISTEMA DE TEMAS (F, M, T, ONLINE) -----------------
    const temas = [

        bg: "url('https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/29a2b646-3fb1-45b4-8424-c1d7e0bd5929/dhaxmaw-82983509-5a34-465f-a0c0-253f8efda679.jpg?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7InBhdGgiOiIvZi8yOWEyYjY0Ni0zZmIxLTQ1YjQtODQyNC1jMWQ3ZTBiZDU5MjkvZGhheG1hdy04Mjk4MzUwOS01YTM0LTQ2NWYtYTBjMC0yNTNmOGVmZGE2NzkuanBnIn1dXSwiYXVkIjpbInVybjpzZXJ2aWNlOmZpbGUuZG93bmxvYWQiXX0.VlvKXKzh_ziob7ir4vYit7b1PPIGGKzsTR41mB9cbDY')",
        radiosIniciais: ['radio_04_punk', 'radio_06_country']
      }
    ];

    const temaSorteado = temas[Math.floor(Math.random() * temas.length)];
    
    const temaOnline = {
      nome: 'Online',
      cor: '#00a2ff', // Azul GTA Online
      sombra: 'rgba(0, 162, 255, 0.5)',
      bg: "url('https://i.pinimg.com/originals/ff/5d/ed/ff5dedb254c42b26f62c39e80b98b071.jpg')"
    };

    function aplicarTemaUI(tema) {
      document.documentElement.style.setProperty('--accent-color', tema.cor);
      document.documentElement.style.setProperty('--accent-shadow', tema.sombra);
      if(tema.bg) document.documentElement.style.setProperty('--bg-image', tema.bg);
    }

    // Aplica o tema sorteado inicialmente
    aplicarTemaUI(temaSorteado);

    // ----------------- SONS DA INTERFACE -----------------
    const uiAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let clickBuffer = null;
    let staticBuffer = null;
    let staticSource = null;
    let staticGain = null;

    function forceWakeUpAudio() {
        if (uiAudioCtx.state !== 'running') uiAudioCtx.resume();
        const osc = uiAudioCtx.createOscillator();
        const gain = uiAudioCtx.createGain();
        gain.gain.value = 0;
        osc.connect(gain);
        gain.connect(uiAudioCtx.destination);
        osc.start();
        osc.stop(uiAudioCtx.currentTime + 0.01);
    }
    ['click', 'touchstart'].forEach(e => document.addEventListener(e, forceWakeUpAudio, {once:true}));

    fetch('RADIO_CLICK.ogg').then(r=>r.arrayBuffer()).then(ab=>uiAudioCtx.decodeAudioData(ab)).then(b=>clickBuffer=b).catch(()=>{});
    fetch('RADIO_STATIC_LOOP.ogg').then(r=>r.arrayBuffer()).then(ab=>uiAudioCtx.decodeAudioData(ab)).then(b=>staticBuffer=b).catch(()=>{});

    function playUIClick() {
        forceWakeUpAudio();
        if (!clickBuffer) return;
        const src = uiAudioCtx.createBufferSource();
        src.buffer = clickBuffer;
        const gain = uiAudioCtx.createGain();
        gain.gain.value = 4.0; 
        src.connect(gain);
        gain.connect(uiAudioCtx.destination);
        src.start();
    }

    function playUIStatic() {
        forceWakeUpAudio();
        if (!staticBuffer) return;
        if (staticSource) stopUIStatic(true); 
        
        staticSource = uiAudioCtx.createBufferSource();
        staticSource.buffer = staticBuffer;
        staticSource.loop = true;
        
        staticGain = uiAudioCtx.createGain();
        staticGain.gain.value = 0.4; 
        
        staticSource.connect(staticGain);
        staticGain.connect(uiAudioCtx.destination);
        staticSource.start();
    }

    function stopUIStatic(immediate = false) {
        if (!staticSource || !staticGain) return;
        const srcToStop = staticSource;
        const gainToFade = staticGain;
        staticSource = null;
        staticGain = null;

        if (immediate) {
            try { srcToStop.stop(); } catch(e){}
            return;
        }
        const now = uiAudioCtx.currentTime;
        gainToFade.gain.cancelScheduledValues(now);
        gainToFade.gain.setValueAtTime(gainToFade.gain.value, now);
        gainToFade.gain.linearRampToValueAtTime(0.001, now + 1.0); 
        setTimeout(() => { try { srcToStop.stop(); } catch(e){} }, 1000);
    }

    // ----------------- CONFIGURAÇÃO DAS RÁDIOS -----------------
    
    // Lista 1: GTA ONLINE (Todas as rádios - Formação Inalterada)
    const radiosOnline = [
      { key: 'radio', name: 'blonded Los Santos 97.8 FM', imgBW: 'capas/radio_station19.png' },
      { key: 'radio', name: 'Los Santos Underground Radio', imgBW: 'capas/radio_station20.png' },
      { key: 'radio', name: 'iFruit Radio', imgBW: 'capas/radio_station21.png' },
      { key: 'radio', name: 'Still Slipping Los Santos', imgBW: 'capas/radio_station23.png' },
      { key: 'radio_01_class_rock', name: 'Los Santos Rock Radio', imgBW: 'capas/radio_station04.png' },
      { key: 'radio_02_pop', name: 'Non-Stop-Pop FM', imgBW: 'capas/radio_station05.png' },
      { key: 'radio_03_hiphop_new', name: 'Radio Los Santos', imgBW: 'capas/radio_station11.png' },
      { key: 'radio_04_punk', name: 'Channel X', imgBW: 'capas/radio_station03.png' },
      { key: 'radio', name: 'WCTR', imgBW: 'capas/radio_station17.png' },
      { key: 'radio_06_country', name: 'Rebel Radio', imgBW: 'capas/radio_station01.png' },
      { key: 'radio', name: 'Soulwax FM', imgBW: 'capas/radio_station06.png' },
      { key: 'radio', name: 'East Los FM', imgBW: 'capas/radio_station02.png' },
      { key: 'radio_09_hiphop_old', name: 'West Coast Classics', imgBW: 'capas/radio_station09.png' },
      { key: 'radio', name: 'Media Player', imgBW: 'capas/radio_station26.png' },
      { key: 'radio', name: 'Blaine County Radio', imgBW: 'capas/radio_station07.png' },
      { key: 'radio', name: 'MOTOMAMI Los Santos', imgBW: 'capas/radio_station24.png' },
      { key: 'radio', name: 'Music Locker Radio', imgBW: 'capas/radio_station22.png' },
      { key: 'radio', name: 'The Blue Ark', imgBW: 'capas/radio_station12.png' },
      { key: 'radio', name: 'WorldWide FM', imgBW: 'capas/radio_station13.png' },
      { key: 'radio', name: 'FlyLo FM', imgBW: 'capas/radio_station14.png' },
      { key: 'radio_15_motown', name: 'The Lowdown 91.1', imgBW: 'capas/radio_station15.png' },
      { key: 'radio_20_thelab', name: 'The Lab', imgBW: 'capas/radio_station18.png' },
      { key: 'radio_16_silverlake', name: 'Radio Mirror Park', imgBW: 'capas/radio_station08.png' },
      { key: 'radio_34_dlc_hei4_kult', name: 'Kult FM 99.1', imgBW: 'capas/radio_station25.png' },
      { key: 'radio', name: 'Space 103.2', imgBW: 'capas/radio_station16.png' },
      { key: 'radio_18_90s_rock', name: 'Vinewood Boulevard Radio', imgBW: 'capas/radio_station10.png' }
    ];

    // Lista 2: OFFLINE (GTA V) - Reordenada conforme as instruções
    const radiosOffline = [
      { key: 'radio', name: 'Los Santos Underground Radio', imgBW: 'capas/radio_station20.png' },
      { key: 'radio', name: 'iFruit Radio', imgBW: 'capas/radio_station21.png' },
      { key: 'radio_01_class_rock', name: 'Los Santos Rock Radio', imgBW: 'capas/radio_station04.png' },
      { key: 'radio_02_pop', name: 'Non-Stop-Pop FM', imgBW: 'capas/radio_station05.png' },
      { key: 'radio_03_hiphop_new', name: 'Radio Los Santos', imgBW: 'capas/radio_station11.png' },
      { key: 'radio_04_punk', name: 'Channel X', imgBW: 'capas/radio_station03.png' },
      { key: 'radio', name: 'WCTR', imgBW: 'capas/radio_station17.png' },
      { key: 'radio_06_country', name: 'Rebel Radio', imgBW: 'capas/radio_station01.png' },
      { key: 'radio', name: 'Soulwax FM', imgBW: 'capas/radio_station06.png' },
      { key: 'radio', name: 'East Los FM', imgBW: 'capas/radio_station02.png' },
      { key: 'radio_09_hiphop_old', name: 'West Coast Classics', imgBW: 'capas/radio_station09.png' },
      { key: 'radio', name: 'Blaine County Radio', imgBW: 'capas/radio_station07.png' },
      { key: 'radio', name: 'The Blue Ark', imgBW: 'capas/radio_station12.png' },
      { key: 'radio', name: 'WorldWide FM', imgBW: 'capas/radio_station13.png' },
      { key: 'radio', name: 'FlyLo FM', imgBW: 'capas/radio_station14.png' },
      { key: 'radio_15_motown', name: 'The Lowdown 91.1', imgBW: 'capas/radio_station15.png' },
      { key: 'radio_20_thelab', name: 'The Lab', imgBW: 'capas/radio_station18.png' },
      { key: 'radio_16_silverlake', name: 'Radio Mirror Park', imgBW: 'capas/radio_station08.png' },
      { key: 'radio', name: 'Space 103.2', imgBW: 'capas/radio_station16.png' },
      { key: 'radio_18_90s_rock', name: 'Vinewood Boulevard Radio', imgBW: 'capas/radio_station10.png' },
      { key: 'radio', name: 'blonded Los Santos 97.8 FM', imgBW: 'capas/radio_station19.png' }
    ];

    const radiosComZoom = [
      'Kult FM 99.1',
      'Los Santos Underground Radio',
      'iFruit Radio',
      'Still Slipping Los Santos',
      'Music Locker Radio'
    ];

    // ----------------- ESTADO GLOBAL E VARIÁVEIS -----------------
    let currentExpansion = null;
    let radiosAtuais = [];
    let currentIndex = 0; 
    let tempSelectedIndex = 0; 
    let currentlyPlayingKey = null; 
    
    let flashImageTimeout = null;
    let pendingAudioTimeout = null; 

    const viewMenu = document.getElementById('viewMenu');
    const viewPlayer = document.getElementById('viewPlayer');
    const wheelContainer = document.getElementById('wheelContainer');
    const centerDisplay = document.getElementById('centerDisplay');
    const activeColorLogo = document.getElementById('activeColorLogo');
    const radioNameText = document.getElementById('radioNameText');

    let holdTimer = null;
    let isHoldingWheel = false;
    let isPointerDown = false;
    
    let clickOriginX = 0;
    let clickOriginY = 0;

    // ----------------- FUNÇÕES AUXILIARES -----------------
    function updateVisuals(index) {
        if (!radiosAtuais[index]) return;
        const rad = radiosAtuais[index];
        activeColorLogo.src = rad.imgBW;
        radioNameText.textContent = rad.name;
        
        // Aplica o zoom específico nas rádios configuradas
        if (radiosComZoom.includes(rad.name)) {
            activeColorLogo.classList.add('zoom-radio');
        } else {
            activeColorLogo.classList.remove('zoom-radio');
        }
    }

    function applyAudio(index) {
        if (!radiosAtuais[index]) return;
        const rad = radiosAtuais[index];
        if (currentlyPlayingKey !== rad.key) {
            playUIStatic();

            if(window.__RADIO && window.__RADIO.stopRadio) window.__RADIO.stopRadio();
            
            if(window.__RADIO && window.__RADIO.startRadio) {
                currentlyPlayingKey = rad.key;
                window.__RADIO.startRadio(currentExpansion, rad.key);
                
                const stopStaticHandler = () => {
                    stopUIStatic(false);
                    window.removeEventListener('radio-ready', stopStaticHandler);
                    clearTimeout(safetyTimeout); 
                };

                window.addEventListener('radio-ready', stopStaticHandler);
                const safetyTimeout = setTimeout(() => { stopStaticHandler(); }, 5000);
            } else {
                stopUIStatic(true);
            }
        }
    }

    // ----------------- LÓGICA DA RODA (WHEEL) E CÂMERA -----------------
    
    function applyMobileWheelPan(index) {
      if (window.innerWidth <= 768) {
        const activeItem = document.getElementById(`wheel_item_${index}`);
        if (activeItem) {
            const x = parseFloat(activeItem.dataset.baseX);
            const y = parseFloat(activeItem.dataset.baseY);
            
            const zoom = 2.0; 
            
            const panX = -x * (zoom - 0.4);
            const panY = -y * (zoom - 0.4);
            
            wheelContainer.style.transformOrigin = `0px 0px`;
            wheelContainer.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
        }
      }
    }

    function buildWheel() {
      // Define a lista correta baseado na expansão
      if (currentExpansion === 'v') {
          radiosAtuais = radiosOffline;
      } else {
          radiosAtuais = radiosOnline;
      }

      wheelContainer.innerHTML = '';
      
      const N = radiosAtuais.length;
      if (N === 0) return;

      const minDim = Math.min(window.innerWidth, window.innerHeight);
      const isMobile = window.innerWidth <= 768;
      
      // Raio base
      const baseRadius = isMobile ? minDim * 0.50 : minDim * 0.39;
      
      // Ajuste proporcional matemático da Roda
      const radius = baseRadius * (N / 26); 

      radiosAtuais.forEach((r, index) => {
        const div = document.createElement('div');
        div.className = 'wheel-item';
        div.id = `wheel_item_${index}`;
        
        const isZoom = radiosComZoom.includes(r.name) ? 'zoom-radio' : '';
        div.innerHTML = `<img src="${r.imgBW}" draggable="false" class="${isZoom}" onerror="this.src='capas/default.png'" />`;
        
        const angle = (index / N) * 2 * Math.PI - (Math.PI / 2);
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        
        div.dataset.baseX = x;
        div.dataset.baseY = y;
        
        div.style.transform = `translate(${x}px, ${y}px)`;

        wheelContainer.appendChild(div);
      });
    }

    function calculateWheelIndexByAngle(clientX, clientY) {
      const N = radiosAtuais.length;
      if(N === 0) return currentIndex;

      const dx = clientX - clickOriginX;
      const dy = clientY - clickOriginY;
      
      if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return tempSelectedIndex;

      let angle = Math.atan2(dy, dx) + Math.PI / 2;
      if (angle < 0) angle += 2 * Math.PI;

      const slice = (2 * Math.PI) / N;
      return Math.round(angle / slice) % N;
    }

    function updateWheelUI(index) {
      if (index === tempSelectedIndex) return;
      
      tempSelectedIndex = index;
      updateVisuals(index);
      playUIClick();

      document.querySelectorAll('.wheel-item').forEach((el, i) => {
        const bx = el.dataset.baseX;
        const by = el.dataset.baseY;
        
        if (i === index) {
            el.classList.add('active');
            el.style.transform = `translate(${bx}px, ${by}px)`; 
        } else {
            el.classList.remove('active');
            el.style.transform = `translate(${bx}px, ${by}px)`;
        }
      });

      applyMobileWheelPan(index);

      clearTimeout(pendingAudioTimeout);
      pendingAudioTimeout = setTimeout(() => {
          currentIndex = tempSelectedIndex;
          applyAudio(tempSelectedIndex);
      }, 1000);
    }

    function handleFastChange(direction) {
      const isHudHidden = !centerDisplay.classList.contains('flash-image') && !centerDisplay.classList.contains('wheel-open');

      if (isHudHidden) {
          direction = 0; 
      }

      currentIndex = (currentIndex + direction + radiosAtuais.length) % radiosAtuais.length;
      tempSelectedIndex = currentIndex; 
      
      updateVisuals(currentIndex);
      if (direction !== 0) playUIClick();

      centerDisplay.classList.add('flash-image');
      clearTimeout(flashImageTimeout);
      flashImageTimeout = setTimeout(() => {
          centerDisplay.classList.remove('flash-image');
      }, 2500); 

      if (direction !== 0) {
          clearTimeout(pendingAudioTimeout);
          pendingAudioTimeout = setTimeout(() => {
              applyAudio(currentIndex);
          }, 800);
      }
    }

    // ----------------- EVENTOS DE INTERAÇÃO -----------------
    const handlePointerDown = (e) => {
      if (e.target.closest('#btnBack')) return;
      
      isPointerDown = true;
      forceWakeUpAudio();

      clickOriginX = e.clientX ?? (e.touches && e.touches[0].clientX);
      clickOriginY = e.clientY ?? (e.touches && e.touches[0].clientY);
      
      tempSelectedIndex = currentIndex;

      holdTimer = setTimeout(() => {
        isHoldingWheel = true;
        wheelContainer.classList.add('visible');
        centerDisplay.classList.add('wheel-open');

        document.querySelectorAll('.wheel-item').forEach((el, i) => {
            const bx = el.dataset.baseX;
            const by = el.dataset.baseY;
            if (i === currentIndex) {
                el.classList.add('active');
                el.style.transform = `translate(${bx}px, ${by}px)`;
            } else {
                el.classList.remove('active');
                el.style.transform = `translate(${bx}px, ${by}px)`;
            }
        });
        
        updateVisuals(currentIndex);
        applyMobileWheelPan(currentIndex);

      }, 150); 
    };

    const handlePointerMove = (e) => {
      if (!isHoldingWheel) return;
      const clientX = e.clientX ?? (e.touches && e.touches[0].clientX);
      const clientY = e.clientY ?? (e.touches && e.touches[0].clientY);
      
      if (clientX !== undefined && clientY !== undefined) {
          const hoverIndex = calculateWheelIndexByAngle(clientX, clientY);
          if (hoverIndex !== tempSelectedIndex) {
              updateWheelUI(hoverIndex);
          }
      }
    };

    const handlePointerUp = (e) => {
      if (!isPointerDown) return;
      isPointerDown = false;
      clearTimeout(holdTimer);

      if (isHoldingWheel) {
        isHoldingWheel = false;
        wheelContainer.classList.remove('visible');
        centerDisplay.classList.remove('wheel-open');
        
        wheelContainer.style.transform = '';
        wheelContainer.style.transformOrigin = '0px 0px';
        
        if (currentIndex !== tempSelectedIndex) {
          currentIndex = tempSelectedIndex;
          clearTimeout(pendingAudioTimeout);
          applyAudio(currentIndex);
        }
        
      } else {
        handleFastChange(1);
      }
    };

    viewPlayer.addEventListener('pointerdown', handlePointerDown);
    window.addEventListener('pointermove', handlePointerMove); 
    window.addEventListener('pointerup', handlePointerUp);
    window.addEventListener('pointercancel', handlePointerUp);

    window.addEventListener('resize', () => {
        if(currentExpansion) buildWheel();
    });

    // ----------------- NAVEGAÇÃO DE MENUS -----------------
    document.querySelectorAll('.btn-exp').forEach(btn => {
      btn.addEventListener('click', (e) => {
        forceWakeUpAudio(); 
        currentExpansion = e.target.getAttribute('data-exp');
        
        // --- GERENCIAMENTO DE TEMAS AO CLICAR NA PLATAFORMA ---
        if (currentExpansion === 'online') {
            aplicarTemaUI(temaOnline);
        } else {
            aplicarTemaUI(temaSorteado);
        }
        
        viewMenu.classList.remove('active');
        viewPlayer.classList.add('active');
        
        buildWheel();
        
        // --- SELEÇÃO DE RÁDIO INICIAL ---
        let indiceInicial = 0;
        
        if (currentExpansion === 'v') {
            // Continua usando a lógica do tema do personagem para o offline
            const chaveRadioSorteada = temaSorteado.radiosIniciais[Math.floor(Math.random() * temaSorteado.radiosIniciais.length)];
            indiceInicial = radiosAtuais.findIndex(r => r.key === chaveRadioSorteada);
        } else {
            // Inicia aleatoriamente APENAS entre a Kult FM e Vinewood no online
            const radiosIniciaisOnline = ['radio_34_dlc_hei4_kult', 'radio_18_90s_rock'];
            const chaveRadioSorteada = radiosIniciaisOnline[Math.floor(Math.random() * radiosIniciaisOnline.length)];
            indiceInicial = radiosAtuais.findIndex(r => r.key === chaveRadioSorteada);
        }
        
        if (indiceInicial === -1) indiceInicial = 0; // Prevenção de erro
        
        currentIndex = indiceInicial;
        tempSelectedIndex = indiceInicial;
        
        centerDisplay.classList.remove('wheel-open');
        wheelContainer.classList.remove('visible');
        centerDisplay.classList.remove('flash-image');
        
        handleFastChange(0); 
        
        clearTimeout(pendingAudioTimeout);
        applyAudio(currentIndex);
      });
    });

    document.getElementById('btnBack').addEventListener('click', (e) => {
      e.stopPropagation(); 
      clearTimeout(holdTimer);
      clearTimeout(flashImageTimeout);
      clearTimeout(pendingAudioTimeout);
      
      isPointerDown = false;
      isHoldingWheel = false;
      
      if(window.__RADIO && window.__RADIO.stopRadio) window.__RADIO.stopRadio();
      currentlyPlayingKey = null; 
      stopUIStatic(true); 

      // Retorna para as cores originais da interface offline
      aplicarTemaUI(temaSorteado);

      viewPlayer.classList.remove('active');
      viewMenu.classList.add('active');
    });

    // Roda do Mouse (Scroll)
    let lastWheelTime = 0;
    viewPlayer.addEventListener('wheel', (e) => {
      if (isHoldingWheel) return; 
      e.preventDefault(); 
      const now = Date.now();
      if (now - lastWheelTime < 250) return; 
      lastWheelTime = now;
      
      forceWakeUpAudio();
      
      if (e.deltaY > 0) handleFastChange(1);
      else handleFastChange(-1);

    }, { passive: false });

  </script>
</body>
</html>
